<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Environment Render</title>
    <script src="https://cdn.socket.io/4.3.2/socket.io.min.js"></script>
</head>

<body>
    <!-- Video container -->
    <div id="video-container">
        <img id="video" src="" alt="Video Feed" />
    </div>

    <div class="control-section">
        <h3>Env control</h3>
        <div class="control-row">
            <button class="button" onclick="sendNextEnv()">Next Env</button>
            <button class="button" onclick="sendResetEnv()">Reset Env</button>
            <button class="button" onclick="switchDebug()">Switch Cmd Debug</button>
            <input type="number" id="env-id-input" placeholder="Enter Env ID" class="input-box">
            <button class="button" onclick="sendEnvID()">Send Env ID</button>
        </div>
    </div>

    <div class="control-section">
        <h3>Speed input range (x, y, z)</h3>
        <div class="control-row">
            <label>X: </label>
            <input type="number" id="vx-min" placeholder="vx min" class="input-box">
            <input type="number" id="vx-max" placeholder="vx max" class="input-box">
        </div>
        <div class="control-row">
            <label>Y: </label>
            <input type="number" id="vy-min" placeholder="vy min" class="input-box">
            <input type="number" id="vy-max" placeholder="vy max" class="input-box">
        </div>
        <div class="control-row">
            <label>Z: </label>
            <input type="number" id="vz-min" placeholder="vz min" class="input-box">
            <input type="number" id="vz-max" placeholder="vz max" class="input-box">
        </div>
        <button class="button" onclick="sendVelocityCommand()">Send Velocity Range</button>
    </div>

    <div class="control-section">
        <h3>Viewer Control</h3>
        <div class="control-row">
            <label>Viewer Point (X, Y, Z): </label>
            <input type="number" id="viewer_p_x" placeholder="viewer_p_x" class="input-box">
            <input type="number" id="viewer_p_y" placeholder="viewer_p_y" class="input-box">
            <input type="number" id="viewer_p_z" placeholder="viewer_p_z" class="input-box">
        </div>
        <button class="button" onclick="sendViewerPoint()">Set Viewer Point</button>
        <div class="control-row">
            <label>Viewer look at (X, Y, Z): </label>
            <input type="number" id="viewer_l_x" placeholder="viewer_l_x" class="input-box">
            <input type="number" id="viewer_l_y" placeholder="viewer_l_y" class="input-box">
            <input type="number" id="viewer_l_z" placeholder="viewer_l_z" class="input-box">
        </div>
        <button class="button" onclick="sendViewerLookAt()">Set Viewer Point</button>
    </div>

    <script>
        // Establish SocketIO connection with the server
        // const socket = io.connect('http://localhost:5733');
        const socket = io();

        // Listen for 'new_frame' event from the server
        socket.on('new_frame', (data) => {
            const img = document.getElementById('video');
            requestAnimationFrame(() => {
                img.src = 'data:image/jpeg;base64,' + data.image;
            });
        });

        function sendNextEnv() {
            socket.emit('next_env');
        };

        function sendResetEnv() {
            socket.emit('reset_env');
        };

        function switchDebug() {
            socket.emit('switch_debug');
        };

        function sendEnvID() {
            const input = document.getElementById('env-id-input');
            const envID = parseInt(input.value);
            if (!isNaN(envID)) {
                socket.emit('set_env_id', { id: envID });
                console.log("Sent env id:", envID);
            } else {
                alert("Please enter a valid number");
            }
        };

        function sendVelocityCommand() {
            const vx = [parseFloat(document.getElementById('vx-min').value), parseFloat(document.getElementById('vx-max').value)];
            const vy = [parseFloat(document.getElementById('vy-min').value), parseFloat(document.getElementById('vy-max').value)];
            const vz = [parseFloat(document.getElementById('vz-min').value), parseFloat(document.getElementById('vz-max').value)];
            socket.emit('set_velocity_range', { vx, vy, vz });
            console.log("Sent set_velocity_range:", { vx, vy, vz });
        };

        function sendViewerPoint() {
            const point = [
                parseFloat(document.getElementById('viewer_p_x').value),
                parseFloat(document.getElementById('viewer_p_y').value),
                parseFloat(document.getElementById('viewer_p_z').value),
            ];
            socket.emit('set_viewer_point', { point });
        };

        function sendViewerLookAt() {
            const point = [
                parseFloat(document.getElementById('viewer_l_x').value),
                parseFloat(document.getElementById('viewer_l_y').value),
                parseFloat(document.getElementById('viewer_l_z').value),
            ];
            socket.emit('set_viewer_look_at', { point });
        }

    </script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        #video-container {
            width: 80%;
            max-width: 800px;
            background-color: #000;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        #video {
            width: 100%;
            border-radius: 8px;
        }

        .control-section {
            background-color: #fff;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }

        .button {
            padding: 10px 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .button:hover {
            background-color: #0056b3;
        }

        .input-box {
            padding: 8px;
            width: 100px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        h3 {
            margin: 0 0 10px 0;
        }
    </style>
</body>

</html>
